apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-landingpage.fullname" . }}
  labels:
    {{- include "ai-landingpage.labels" . | nindent 4 }}
    app: {{ include "ai-landingpage.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ai-landingpage.selectorLabels" . | nindent 6 }}
      app: {{ include "ai-landingpage.fullname" . }}
  template:
    metadata:
      labels:
        {{- include "ai-landingpage.selectorLabels" . | nindent 8 }}
        app: {{ include "ai-landingpage.fullname" . }}
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.container.port }}
              name: http
          env:
            - name: PORT
              value: {{ .Values.container.env.PORT | quote }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.healthPath }}
              port: {{ .Values.container.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.healthPath }}
              port: {{ .Values.container.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
